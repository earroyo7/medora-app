<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Medora | AI Health Companion</title>

<style>
:root{
  --primary:#7B5CFF;
  --primary2:#9F7BFF;
  --bg:#F6F4FF;
  --card:#FFFFFF;
  --text:#1A1A2E;
  --muted:#6B6B8D;
  --border:#ECEBFF;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
  background:var(--bg);
  color:var(--text);
}

.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:100px;
}

/* HEADER */

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  background:white;
  position:sticky;
  top:0;
  z-index:20;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:800;
  font-size:20px;
  color:var(--primary);
}

.logo-heart{
  width:20px;
  height:20px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  transform:rotate(45deg);
  border-radius:4px;
  position:relative;
}

.logo-heart::before,
.logo-heart::after{
  content:"";
  position:absolute;
  width:20px;
  height:20px;
  background:inherit;
  border-radius:50%;
}

.logo-heart::before{top:-10px;left:0;}
.logo-heart::after{left:-10px;top:0;}

.icon-btn{
  border:none;
  background:#F1EEFF;
  padding:10px;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}

/* HERO */

.hero{
  margin:16px;
  padding:20px;
  border-radius:24px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
}

.hero-text{
  max-width:60%;
}

.hero h2{
  margin:0 0 6px 0;
}

.hero p{
  margin:0;
  font-size:14px;
  opacity:.9;
}

.avatar{
  width:120px;
  border-radius:18px;
}

.primary-btn{
  margin-top:12px;
  padding:12px 16px;
  border:none;
  border-radius:16px;
  background:white;
  color:var(--primary);
  font-weight:700;
  cursor:pointer;
}

/* CARDS */

.card{
  background:var(--card);
  margin:16px;
  padding:16px;
  border-radius:20px;
  border:1px solid var(--border);
}

.card h3{
  margin-top:0;
}

/* FORM */

label{
  font-size:12px;
  font-weight:700;
  margin-top:12px;
  display:block;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:14px;
}

textarea{
  min-height:70px;
}

.save-btn{
  margin-top:14px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* CHAT */

.chat-box{
  height:320px;
  overflow-y:auto;
  border:1px solid var(--border);
  border-radius:18px;
  padding:10px;
  background:white;
}

.msg{
  padding:10px 14px;
  border-radius:18px;
  margin-bottom:10px;
  max-width:80%;
  font-size:14px;
}

.user{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  margin-left:auto;
}

.bot{
  background:#F2F1FF;
}

.chat-row{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.chat-row input{
  flex:1;
}

.chat-row button{
  border:none;
  padding:10px 14px;
  border-radius:12px;
  background:var(--primary);
  color:white;
  cursor:pointer;
}

/* NAV */

.nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  max-width:430px;
  width:100%;
  background:white;
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:repeat(4,1fr);
  text-align:center;
  padding:8px 0;
}

.nav button{
  border:none;
  background:none;
  font-size:12px;
  cursor:pointer;
}

.page{display:none;}
.page.active{display:block;}
</style>
</head>

<body>

<div class="app">

<div class="header">
<button class="icon-btn" onclick="showPage('home')">☰</button>

<div class="logo">
<div class="logo-heart"></div>
Medora
</div>

<button class="icon-btn">🔔</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="hero">
<div class="hero-text">
<h2>Hi, I'm Medora 💜</h2>
<p>Your AI wellness companion for insight and clarity.</p>
<button class="primary-btn" onclick="showPage('chat')">Talk to Medora</button>
</div>
<img src="medora-avatar.png" class="avatar"/>
</div>

<div class="card">
<h3>Daily Overview</h3>
<p style="color:var(--muted)">Track mood, sleep, behavior, nutrition, stress, and more.</p>
</div>

</div>

<!-- HEALTH LOG -->
<div id="health" class="page">
<div class="card">
<h3>Comprehensive Health Log</h3>

<label>Mood (1–10)</label>
<input id="mood"/>

<label>Sleep Hours</label>
<input id="sleep"/>

<label>Anxiety Level (1–10)</label>
<input id="anxiety"/>

<label>Stress Level</label>
<input id="stress"/>

<label>Physical Symptoms</label>
<textarea id="symptoms"></textarea>

<label>Behavior Patterns (focus, motivation, irritability)</label>
<textarea id="behavior"></textarea>

<label>Dietary Intake</label>
<textarea id="diet"></textarea>

<label>Hydration (cups of water)</label>
<input id="hydration"/>

<label>Physical Activity</label>
<textarea id="activity"></textarea>

<label>Medications / Supplements</label>
<textarea id="medications"></textarea>

<label>Additional Notes</label>
<textarea id="notes"></textarea>

<button class="save-btn" onclick="saveHealth()">Save Log</button>

</div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div class="card">
<h3>Chat with Medora</h3>
<div class="chat-box" id="chatBox">
<div class="msg bot">Hi. Tell me what’s going on today.</div>
</div>

<div class="chat-row">
<input id="chatInput" placeholder="Type a message..."/>
<button onclick="sendMessage()">Send</button>
</div>
</div>
</div>

</div>

<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('health')">Log</button>
<button onclick="showPage('chat')">Chat</button>
<button onclick="showPage('home')">Profile</button>
</div>

<script>

const storeKey="medoraData";

function getData(){
return JSON.parse(localStorage.getItem(storeKey))||{logs:[],chat:[]};
}

function saveData(d){
localStorage.setItem(storeKey,JSON.stringify(d));
}

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function saveHealth(){
const data=getData();
data.logs.push({
date:new Date().toLocaleString(),
mood:mood.value,
sleep:sleep.value,
anxiety:anxiety.value,
stress:stress.value,
symptoms:symptoms.value,
behavior:behavior.value,
diet:diet.value,
hydration:hydration.value,
activity:activity.value,
medications:medications.value,
notes:notes.value
});
saveData(data);
alert("Health log saved.");
showPage("home");
}

function addMessage(text,type){
const box=document.getElementById("chatBox");
const div=document.createElement("div");
div.className="msg "+type;
div.textContent=text;
box.appendChild(div);
box.scrollTop=box.scrollHeight;
}

async function sendMessage(){
const input=document.getElementById("chatInput");
const text=input.value.trim();
if(!text)return;

addMessage(text,"user");
input.value="";

try{
const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const result=await res.json();
addMessage(result.reply||"I'm here.","bot");

}catch(e){
addMessage("Connection issue.","bot");
}
}

</script>

</body>
</html>
